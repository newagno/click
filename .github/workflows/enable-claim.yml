name: Enable Daily Claim

on:
  schedule:
    - cron: '50 4,5 * * *' # Запуск о 04:50 та 05:50 UTC (щоб покрити 08:00 за Києвом влітку та взимку)
  workflow_dispatch:      # Можливість запуску кнопкою вручну

permissions:
  actions: write

jobs:
  enable:
    runs-on: ubuntu-latest
    steps:
      - name: Enable workflow if it's almost 08:00 Kyiv time
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 -c "
          import datetime, os
          from datetime import timezone, timedelta
          
          def get_kyiv_offset(dt):
              year = dt.year
              march_last = datetime.datetime(year, 3, 31, 1, 0, tzinfo=timezone.utc)
              march_offset = (march_last.weekday() + 1) % 7
              dst_start = march_last - timedelta(days=march_offset)
              oct_last = datetime.datetime(year, 10, 31, 1, 0, tzinfo=timezone.utc)
              oct_offset = (oct_last.weekday() + 1) % 7
              dst_end = oct_last - timedelta(days=oct_offset)
              if dst_start <= dt < dst_end:
                  return timezone(timedelta(hours=3))
              return timezone(timedelta(hours=2))
              
          now_utc = datetime.datetime.now(timezone.utc)
          now_kyiv = now_utc.astimezone(get_kyiv_offset(now_utc))
          print(f'Current UTC time: {now_utc}')
          print(f'Current Kyiv time: {now_kyiv}')
          
          # Enable if it's 07:xx Kyiv time (which is right before 08:00)
          if now_kyiv.hour == 7:
              print('It is before 08:00 Kyiv time. Enabling daily-claim workflow!')
              repo = os.environ.get('GITHUB_REPOSITORY', '')
              if repo:
                  result = os.system(f'gh workflow enable daily-claim.yml --repo {repo}')
                  if result == 0:
                      print('Workflow enabled successfully.')
                  else:
                      print('Failed to enable workflow.')
          else:
              print('Not the right time to enable.')
          "
