name: Daily Incrypted Claim

on:
  schedule:
    - cron: '*/30 * * * *' # Запуск кожні 30 хвилин
  workflow_dispatch:      # Можливість запуску кнопкою вручну

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Xvfb
        run: |
          sudo apt-get install -y xvfb

      - name: Run script
        id: claim_script
        env:
          INCRYPTED_EMAIL: ${{ secrets.INCRYPTED_EMAIL }}
          INCRYPTED_PASSWORD: ${{ secrets.INCRYPTED_PASSWORD }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          RESIDENTIAL_PROXY: ${{ secrets.RESIDENTIAL_PROXY }}
          DISPLAY: ":99"
        run: |
          # Start Xvfb virtual display (1920x1080, 24-bit color)
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 2
          # Run script using the virtual display
          python src/main.py

      - name: Disable workflow if claimed
        if: steps.claim_script.outputs.claimed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow disable daily-claim.yml --repo ${{ github.repository }}


      - name: Commit and push state if changed
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.json || true
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update claim state [skip ci]" && git push)

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: |
            *.png
            *.html
          retention-days: 3