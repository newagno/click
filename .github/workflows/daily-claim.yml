name: Daily Incrypted Claim

on:
  schedule:
    - cron: '5 6 * * *'      # 08:05/09:05 Kyiv (depending on DST)
    - cron: '0 12 * * *'     # Backup: 14:00/15:00 Kyiv
  workflow_dispatch:
  push:
    paths:
      - 'src/**'
      - 'tests/**'
      - '.github/workflows/daily-claim.yml'
      - 'requirements.txt'
  pull_request:

concurrency:
  group: daily-claim
  cancel-in-progress: false

permissions:
  contents: write      # Required to commit state.json back to repo

jobs:
  test:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - run: pip install -r requirements.txt
      
      - name: Run Tests
        run: python -m pytest tests/

  claim_flow:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - run: pip install -r requirements.txt
      
      - name: Check Status
        id: check
        run: python src/main.py --mode check
      
      - name: Execute Claim
        if: steps.check.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        uses: GabrielBB/xvfb-action@v1
        env:
          INCRYPTED_EMAIL: ${{ secrets.INCRYPTED_EMAIL }}
          INCRYPTED_PASSWORD: ${{ secrets.INCRYPTED_PASSWORD }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          RESIDENTIAL_PROXY: ${{ secrets.RESIDENTIAL_PROXY }}
        with:
          run: python src/main.py --mode claim

      - name: Commit and Push state.json
        if: success() || always() # Best to check if file changed even if partial success
        run: |
          if [[ -n $(git status -s state.json) ]]; then
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "Update state [skip ci]"
            git pull --rebase origin main
            git push origin HEAD:main
          else
            echo "No changes to state.json to commit."
          fi

      - name: Upload debug artifacts
        if: failure() || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ github.run_id }}
          path: |
            debug_*.png
            debug_*.html
            debug_traceback_*.txt
          retention-days: 3