name: Daily Incrypted Claim

on:
  schedule:
    - cron: '5 6 * * *'      # 09:05 Kyiv (UTC+3 summer)
    - cron: '0 7 * * *'      # 10:00 Kyiv — backup #1
    - cron: '0 12 * * *'     # 15:00 Kyiv — backup #2 (catches missed morning)
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'tests/**'
      - 'requirements.txt'

# Static group guarantees only one process touches state.json and the target site at a time.
concurrency:
  group: daily-claim
  cancel-in-progress: false

permissions:
  contents: write      # Required to commit state.json back to repo

jobs:
  test:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Run Tests
        run: python -m pytest tests/

  claim_flow:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Check Status
        id: check
        run: python src/main.py --mode check

      - name: Install Xvfb
        if: steps.check.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Execute Claim
        if: steps.check.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        env:
          INCRYPTED_EMAIL: ${{ secrets.INCRYPTED_EMAIL }}
          INCRYPTED_PASSWORD: ${{ secrets.INCRYPTED_PASSWORD }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          RESIDENTIAL_PROXY: ${{ secrets.RESIDENTIAL_PROXY }}
        run: xvfb-run --auto-servernum python src/main.py --mode claim

      - name: Commit and Push state.json
        if: always()
        run: |
          if [[ -n $(git status -s state.json) ]]; then
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "Update state [skip ci]"
            git pull --rebase origin main
            git push origin HEAD:main
          else
            echo "No changes to state.json to commit."
          fi

      - name: Upload debug artifacts
        if: failure() || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ github.run_id }}
          path: |
            debug_*.png
            debug_*.html
            debug_traceback_*.txt
          retention-days: 3